name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pdf-diff/shared-types build
      - run: pnpm --filter @pdf-diff/shared-types test
      - run: pnpm --filter @pdf-diff/web typecheck
      - run: pnpm --filter @pdf-diff/web lint
      - run: pnpm --filter @pdf-diff/web build
        env:
          WORKER_URL: http://localhost:8000

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r apps/worker/requirements.txt
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pdf-diff/shared-types build
      - run: pnpm --filter @pdf-diff/web build
        env:
          WORKER_URL: http://127.0.0.1:8000
      - name: Start worker
        working-directory: apps/worker
        env:
          PYTHONPATH: .
        run: uvicorn app.main:app --host 127.0.0.1 --port 8000 &
      - name: Start web
        run: pnpm --filter @pdf-diff/web start &
        env:
          WORKER_URL: http://127.0.0.1:8000
      - run: npx playwright install chromium --with-deps
        working-directory: apps/web
      - run: sleep 12 && pnpm --filter @pdf-diff/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          CI: "true"

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install worker deps
        run: pip install -r apps/worker/requirements.txt
      - name: Run worker tests
        working-directory: apps/worker
        env:
          PYTHONPATH: .
        run: pytest -q -m "not slow"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose config
      - name: Build images
        run: docker compose build
